name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: No Cyrillic in source
        run: |
          if rg '[А-Яа-яЁё]' src/; then
            echo "Russian text found in src/ — use English for docstrings and logs"
            exit 1
          fi

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest with coverage
        run: uv run pytest -q

      - name: Bandit
        run: uv run bandit -r src/syscleaner -ll

      - name: CLI smoke test
        run: uv run syscleaner health

  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --all-groups --all-extras
      - run: uv run pytest -q
      - run: uv run syscleaner --lang ru health
