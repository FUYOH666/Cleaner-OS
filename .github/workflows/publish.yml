name: Publish

# Manual only until PyPI trusted publisher is configured (see docs/PYPI_DEFERRED.md).
# Re-enable after setup:
#   on:
#     push:
#       tags: ["v*"]
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git ref to publish (e.g. v1.1.0)
        required: true
        default: v1.1.0

permissions:
  id-token: write
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
