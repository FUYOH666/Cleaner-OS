name: System Cleaner Scan
description: Run syscleaner scan and optionally upload SARIF
inputs:
  scan-args:
    description: Extra args for syscleaner scan (e.g. --all)
    required: false
    default: "--all"
  upload-sarif:
    description: Upload SARIF to GitHub Code Scanning
    required: false
    default: "false"
  sarif-path:
    description: SARIF output path
    required: false
    default: results.sarif
runs:
  using: composite
  steps:
    - name: Install syscleaner
      shell: bash
      run: pip install syscleaner

    - name: Run scan
      shell: bash
      run: |
        syscleaner scan ${{ inputs.scan-args }} --save-results scan.json
        syscleaner export-sarif --from-scan scan.json -o "${{ inputs.sarif-path }}"

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-path }}
